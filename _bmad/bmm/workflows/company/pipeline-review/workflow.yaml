config_source: "{project-root}/_bmad/bmm/config.yaml"
template: false
default_output_file: "{output_folder}/status/pipeline-tracker.md"

instructions: |
  <steps>
    <step n="1" title="Load current pipeline">
      <action>Read {output_folder}/status/pipeline-tracker.md if it exists — load current deal list.</action>
      <action>Ask the user to confirm or update the deal list: Account name, Stage, ARR, Expected Close Date, Probability.</action>
    </step>

    <step n="2" title="Calculate pipeline metrics">
      <action>Total pipeline value: sum of all ARR.</action>
      <action>Weighted pipeline: sum of (ARR × probability) for each deal.</action>
      <action>Pipeline coverage ratio: weighted pipeline / revenue target for period.</action>
      <action>Flag if coverage ratio is below 3× as pipeline risk.</action>
    </step>

    <step n="3" title="Stage-by-stage velocity analysis">
      <action>For each pipeline stage, count deals and average age in stage.</action>
      <action>Flag deals that have been in the same stage for more than 2× the expected stage duration.</action>
      <action>Identify deals at risk of slipping quarter.</action>
    </step>

    <step n="4" title="Identify action items">
      <action>For each stalled deal: determine the next action to advance or qualify out.</action>
      <action>For deals in late stages: confirm all close criteria are met (champion confirmed, economic buyer engaged, legal/procurement started).</action>
    </step>

    <step n="5" title="Write updated pipeline tracker">
      <action>Write {output_folder}/status/pipeline-tracker.md with the following structure:</action>
      <action>
        # Pipeline Tracker — {current_date}

        ## Summary
        - Total Pipeline: [ARR]
        - Weighted Pipeline: [ARR]
        - Revenue Target (Period): [ARR]
        - Coverage Ratio: [ratio]x — [🟢 Healthy / 🟡 Thin / 🔴 At Risk]

        ## Deal Pipeline
        | Account | Stage | ARR | Probability | Expected Close | Age in Stage | Status |
        |---------|-------|-----|-------------|----------------|--------------|--------|

        ## Stalled Deals
        | Account | Stage | Days Stalled | Blocker | Next Action | Owner |
        |---------|-------|--------------|---------|-------------|-------|

        ## Forecast
        | Period | Committed | Best Case | Conservative |
        |--------|-----------|-----------|--------------|

        ## Actions Required
        - [Owner]: [Action] on [Account] by [Date]
      </action>
    </step>
  </steps>
